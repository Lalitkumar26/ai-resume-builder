<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="toast-container" id="toastContainer"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="loading-text" id="loadingText">Loading...</p>
</div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
      <i class="fas fa-file-alt"></i> ResumeAI
    </div>
    <h2 class="auth-title">Welcome Back!</h2>
    <p class="auth-subtitle">Log in to continue building your perfect resume.</p>
    <div class="alert alert-error" id="loginError"></div>
    <div class="alert alert-success" id="loginSuccess"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-error" id="loginEmailError">Please enter a valid email.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required />
          <span class="toggle-password" onclick="togglePass('loginPassword', this)"><i class="fas fa-eye"></i></span>
        </div>
        <div class="form-error" id="loginPassError">Password must be at least 6 characters.</div>
      </div>
      <div class="form-group">
        <label class="form-checkbox"><input type="checkbox" id="rememberMe" /> Remember me</label>
        <a href="#" class="forgot-link" id="forgotPasswordBtn" style="float:right;">Forgot Password?</a>
        <div style="clear:both;"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Log In</button>
    </form>
    <div class="auth-divider"><span>or continue with</span></div>
    <button class="btn-google" id="googleLoginBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Continue with Google
    </button>
    <div class="auth-footer">Don't have an account? <a href="signup.html">Sign up for free</a></div>
    <div class="auth-footer" style="margin-top:8px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></div>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
